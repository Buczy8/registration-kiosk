services:
  reverse-proxy:
    build:
      context: .
      dockerfile: infrastructure/caddy/Dockerfile
      args:
        VITE_KIOSK_IDLE_LOGOUT_SECONDS: ${KIOSK_IDLE_LOGOUT_SECONDS:-30}
    environment:
      KIOSK_TOKEN: ${KIOSK_TOKEN:-change-me-kiosk-token-min-16-chars}
    container_name: kiosk-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: kiosk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiosk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiosk}
      POSTGRES_DB: ${POSTGRES_DB:-kiosk}
      TZ: ${START_NUMBER_TIMEZONE:-Europe/Warsaw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kiosk} -d ${POSTGRES_DB:-kiosk}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+psycopg_async://${POSTGRES_USER:-kiosk}:${POSTGRES_PASSWORD:-kiosk}@db:5432/${POSTGRES_DB:-kiosk}
      KIOSK_TOKEN: ${KIOSK_TOKEN:-change-me-kiosk-token-min-16-chars}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret-key-min-32-characters-long}
      START_NUMBER_TIMEZONE: ${START_NUMBER_TIMEZONE:-Europe/Warsaw}
      STORAGE_ROOT: /app/storage
      FORM_TEMPLATES_DIR: /app/templates/forms
      PRINTER_HOST: ${PRINTER_HOST:-localhost}
      PRINTER_PORT: ${PRINTER_PORT:-9100}
      PRINT_ENABLED: ${PRINT_ENABLED:-true}
      PRINTER_USE_PJL: ${PRINTER_USE_PJL:-true}
    expose:
      - "8000"
    volumes:
      - ./storage:/app/storage
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s


volumes:
  postgres_data:
  caddy_data:
  caddy_config:
