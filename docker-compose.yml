services:
  db:
    image: postgres:15-alpine
    container_name: kiosk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiosk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiosk}
      POSTGRES_DB: ${POSTGRES_DB:-kiosk}
      TZ: ${START_NUMBER_TIMEZONE:-Europe/Warsaw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kiosk} -d ${POSTGRES_DB:-kiosk}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
