services:
  db:
    image: postgres:15-alpine
    container_name: kiosk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiosk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiosk}
      POSTGRES_DB: ${POSTGRES_DB:-kiosk}
      TZ: ${START_NUMBER_TIMEZONE:-Europe/Warsaw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kiosk} -d ${POSTGRES_DB:-kiosk}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiosk-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+psycopg_async://${POSTGRES_USER:-kiosk}:${POSTGRES_PASSWORD:-kiosk}@db:5432/${POSTGRES_DB:-kiosk}
      KIOSK_TOKEN: ${KIOSK_TOKEN:-change-me-kiosk-token-min-16-chars}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret-key-min-32-characters-long}
      START_NUMBER_TIMEZONE: ${START_NUMBER_TIMEZONE:-Europe/Warsaw}
      STORAGE_ROOT: /app/storage
      FORM_TEMPLATES_DIR: /app/templates/forms
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  node:
    image: node:22-alpine
    container_name: kiosk-node
    working_dir: /workspace/frontend
    restart: unless-stopped
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    environment:
      VITE_KIOSK_TOKEN: ${KIOSK_TOKEN:-change-me-kiosk-token-min-16-chars}
      VITE_API_BASE_URL: /api/v1
      VITE_API_PROXY_TARGET: http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
